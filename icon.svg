<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Blue-to-purple liquid glass gradient, starts more blue -->
    <linearGradient id="glass" x1="0.1" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="15%" stop-color="#3b82f6"/>
      <stop offset="35%" stop-color="#4f6df6"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="75%" stop-color="#8b5cf6"/>
      <stop offset="90%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Highlight/shine gradient for top edge, less white -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Inner glow for depth -->
    <linearGradient id="innerGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#93bbfd" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Soft shadow for columns -->
    <filter id="colShadow" x="-15%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Off-white background -->
  <rect x="0" y="0" width="1024" height="1024" fill="#eae7e2"/>

  <!-- Left column (taller, moved down) -->
  <g filter="url(#colShadow)">
    <rect x="230" y="260" width="240" height="520" rx="36" ry="36" fill="url(#glass)"/>
    <rect x="230" y="260" width="240" height="520" rx="36" ry="36" fill="url(#innerGlow)"/>
    <rect x="230" y="260" width="240" height="520" rx="36" ry="36" fill="url(#shine)"/>
    <!-- Glass border -->
    <rect x="230" y="260" width="240" height="520" rx="36" ry="36"
          fill="none" stroke="white" stroke-opacity="0.45" stroke-width="4"/>
  </g>

  <!-- Right column (shorter, moved down) -->
  <g filter="url(#colShadow)">
    <rect x="520" y="260" width="240" height="380" rx="36" ry="36" fill="url(#glass)"/>
    <rect x="520" y="260" width="240" height="380" rx="36" ry="36" fill="url(#innerGlow)"/>
    <rect x="520" y="260" width="240" height="380" rx="36" ry="36" fill="url(#shine)"/>
    <!-- Glass border -->
    <rect x="520" y="260" width="240" height="380" rx="36" ry="36"
          fill="none" stroke="white" stroke-opacity="0.45" stroke-width="4"/>
  </g>
</svg>
